<!doctype html>
<html>
  <head>
    <title>Assignment 2</title>
    <meta charset="utf-8" />
    <style>
      :root {
        --text: #171618;
        --background: #f0eff0;
        --primary: #b63ddf;
        --secondary: #e3e2e4;
        --accent: #7f7981;
        font-family: "Ubuntu Mono", monospace;
        background-color: var(--background);
      }

      p {
        text-align: justify;
      }
    </style>
    <script src="math.js" type="text/javascript"></script>
  </head>
  <body>
    <center id="container" style="position: relative">
      <div>
        <h1
          id="top-label"
          style="position: absolute; left: 0; top: 0px; width: 100%"
        >
          |1⟩
        </h1>
        <h1
          id="bottom-label"
          style="position: absolute; left: 0; top: 600px; width: 100%"
        >
          -|1⟩
        </h1>
        <h1
          id="left-label"
          style="
            position: absolute;
            left: calc(-300px - 1rem);
            top: 300px;
            width: 100%;
          "
        >
          -|0⟩
        </h1>
        <h1
          id="right-label"
          style="
            position: absolute;
            left: calc(300px + 0.5rem);
            top: 300px;
            width: 100%;
          "
        >
          |0⟩
        </h1>

        <h1
          id="top-right-label"
          style="position: absolute; left: 212px; top: 88px; width: 100%"
        >
          |+⟩
        </h1>

        <h1
          id="top-left-label"
          style="position: absolute; left: -212px; top: 88px; width: 100%"
        >
          |-⟩
        </h1>

        <h1
          id="bottom-right-label"
          style="position: absolute; left: 212px; top: 512px; width: 100%"
        >
          -|-⟩
        </h1>

        <h1
          id="bottom-right-label"
          style="position: absolute; left: -212px; top: 512px; width: 100%"
        >
          -|+⟩
        </h1>

        <h1
          id="bottom-right-label"
          style="position: absolute; left: -212px; top: 512px; width: 100%"
        >
          -|+⟩
        </h1>

        <h1
          id="bottom-right-label"
          style="position: absolute; left: 0px; top: 300px; width: 100%"
        >
          |i⟩
        </h1>
      </div>

      <canvas
        height="512"
        width="512"
        id="canvas1"
        style="background-color: var(--background); padding-top: 5rem"
      ></canvas>

      <script src="script.js"></script>
      <script src="shader.js"></script>
      <script src="render.js"></script>
    </center>
  </body>
</html>
