<!doctype html>
<html>
  <head>
    <title>Assignment 2</title>
    <meta charset="utf-8" />
    <style>
      :root {
        --text: #171618;
        --background: #f0eff0;
        --primary: #b63ddf;
        --secondary: #e3e2e4;
        --accent: #7f7981;
        font-family: "Ubuntu Mono", monospace;
        background-color: var(--background);
      }

      p {
        text-align: justify;
      }
      button {
        width: 10rem;
      }
    </style>
    <script src="math.js" type="text/javascript"></script>
       <script src="init_gl.js" defer></script>
       <script src="qubit.js" defer></script>
       <script src="render_loop.js" defer></script>
      <script src="shader.js" defer></script>
  </head>
  <body>
    <div style="display: flex; flex-direction: row; justify-content: space-around;">
      <center id="container" style="position: relative">
        <div>
          <h1
            id="top-label"
            style="position: absolute; left: 0; top: 0px; width: 100%"
          ></h1>
          <h1
            id="bottom-label"
            style="position: absolute; left: 0; top: 600px; width: 100%"
          ></h1>
          <h1
            id="left-label"
            style="
              position: absolute;
              left: calc(-300px - 1rem);
              top: 300px;
              width: 100%;
            "
          ></h1>
          <h1
            id="right-label"
            style="
              position: absolute;
              left: calc(300px + 0.5rem);
              top: 300px;
              width: 100%;
            "
          ></h1>
        </div>
        <canvas
          height="512"
          width="512"
          id="canvas1"
          style="background-color: var(--background); padding-top: 5rem"
        ></canvas>
      </center>
      <div
        style="
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          grid-template-rows: 1fr 1fr 1fr 1fr;
          grid-auto-flow: row;
          padding-top: 8rem;
          column-gap: 1rem;
          row-gap: 1rem;
          align-items: center;
        "
        id="gates"
      >
        <button type="button"><h2>I</h2></button>
        <button type="button" onclick="hadamard()"><h2>H</h2></button>
        <button type="button" onclick="reset()"><h2>Reset</h2></button>
        <button type="button" onclick="x_90()"><h2>X +90°</h2></button>
        <button type="button" onclick="x_180()"><h2>X +180°</h2></button>
        <button type="button" onclick="x_270()"><h2>X -90°</h2></button>
        <button type="button" onclick="y_90()"><h2>Y +90°</h2></button>
        <button type="button" onclick="y_180()"><h2>Y +180°</h2></button>
        <button type="button" onclick="y_270()"><h2>Y -90°</h2></button>
        <button type="button" onclick="z_90()"><h2>Z +90°</h2></button>
        <button type="button" onclick="z_180()"><h2>Z +180°</h2></button>
        <button type="button" onclick="z_270()"><h2>Z -90°</h2></button>
      </>
    </div>
  </body>

      
</html>
